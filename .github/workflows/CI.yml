name: CI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Manual version override (e.g. 1.0.4). Leave empty for an automatic patch bump."
        required: false
        default: ""
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Test Python extension
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install maturin
          python -m pip install -r requirements.txt

      - name: Build wheel
        run: maturin build --release --out dist

      - name: Install built wheel
        run: python -m pip install --force-reinstall --no-deps dist/*.whl

      - name: Run package smoke test
        run: |
          python - <<'PY'
          import numpy as np
          import tleco as tl
          from tleco import constants, conversion_funcs, misc_func

          gamma = tl.gofb(0.1)
          assert abs(gamma - 1.005) < 1e-3, gamma

          values = tl.gofb(np.array([0.1, 0.25, 0.5]))
          assert values.shape == (3,), values

          sample = misc_func.power_law(1.0, np.array([1.0, 2.0, 3.0]), -2.0, 1.0, 3.0)
          assert sample.shape == (3,), sample

          _ = constants.cLight
          _ = conversion_funcs.ev2ergs(1.0)
          print("package smoke test ok")
          PY

  prepare-release:
    name: Update version, README, and tag
    runs-on: ubuntu-latest
    needs: tests
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'push' &&
        (github.ref_name == 'main' || github.ref_name == 'master') &&
        !contains(github.event.head_commit.message, '[Trigger-Release]')
      )
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.README_PAT }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pipreqs poetry semver toml

      - name: Determine release version
        id: versioning
        env:
          MANUAL_INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          manual_version_pattern='\[set version ([0-9]+\.[0-9]+\.[0-9]+)\]'
          latest_commit_message="$(git log -1 --pretty=%B)"

          if [[ "$latest_commit_message" =~ $manual_version_pattern ]]; then
            new_version="${BASH_REMATCH[1]}"
          elif [[ -n "${MANUAL_INPUT_VERSION:-}" ]]; then
            new_version="${MANUAL_INPUT_VERSION}"
          else
            current_version="$(cat VERSION.txt)"
            new_version="$(python -c "import semver; print(semver.bump_patch('${current_version}'))")"
          fi

          if git rev-parse "v${new_version}" >/dev/null 2>&1; then
            echo "Tag v${new_version} already exists."
            exit 1
          fi

          printf '%s\n' "${new_version}" > VERSION.txt
          echo "NEW_VERSION=${new_version}" >> "$GITHUB_ENV"
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"

      - name: Refresh README and dependency metadata
        run: python readme_updater.py

      - name: Commit release preparation changes
        run: |
          set -euo pipefail
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add VERSION.txt pyproject.toml Cargo.toml README.md requirements.txt
          git commit -m "[Trigger-Release] Increment version to ${NEW_VERSION}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Create and push release tag
        run: |
          set -euo pipefail
          git tag -a "v${NEW_VERSION}" -m "Tagging version v${NEW_VERSION}"
          git push origin "v${NEW_VERSION}"
